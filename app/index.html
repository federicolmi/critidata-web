<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gestión de laboratorio clínico para nefrología">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CritiData Nefrología">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="assets/assets/images/LogoCritiData.jpeg"/>

  <title>CritiData Nefrología</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #loading {
      position: fixed;
      inset: 0;
      background: #0D1B3E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      object-fit: cover;
    }

    #loading p {
      color: rgba(255,255,255,0.5);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <img src="assets/assets/images/LogoCritiData.jpeg" alt="CritiData">
    <div class="spinner"></div>
    <p>CritiData Nefrología</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(() => el.remove(), 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
