<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña - CritiData</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f1f5f9;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: white; border-radius: 14px; padding: 40px 36px;
            width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
        p  { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        label { font-size: 13px; color: #374151; font-weight: 600; display: block; margin-bottom: 6px; }
        .field { margin-bottom: 16px; }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 42px; }
        input {
            width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0;
            border-radius: 8px; font-size: 14px;
        }
        .toggle-pass {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 0;
        }
        .pass-hints { list-style: none; padding: 6px 0 0 2px; font-size: 12px; color: #aaa; }
        .pass-hints li { padding: 2px 0; }
        .pass-hints li.ok { color: #22c55e; }
        .pass-hints li.ok::before { content: "✓ "; }
        .pass-hints li:not(.ok)::before { content: "✗ "; }
        .btn {
            width: 100%; padding: 12px; background: #4a90e2; color: white;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px;
        }
        .btn:disabled { background: #93c5fd; cursor: not-allowed; }
        .msg { margin-top: 14px; font-size: 14px; text-align: center; min-height: 20px; }
        .msg.ok  { color: #22c55e; }
        .msg.err { color: #ef4444; }
        .volver { text-align: center; margin-top: 16px; font-size: 13px; }
        .volver a { color: #4a90e2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Nueva contraseña</h2>
        <p>Ingresá y confirmá tu nueva contraseña.</p>

        <div class="field">
            <label>Nueva contraseña</label>
            <div class="password-wrap">
                <input id="new-pass" type="password" placeholder="Mínimo 8 caracteres" oninput="checkPass(this.value)">
                <button type="button" class="toggle-pass" onclick="togglePass('new-pass', this, event)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <ul class="pass-hints" id="pass-hints">
                <li id="hint-len">Mínimo 8 caracteres</li>
                <li id="hint-upper">Una mayúscula</li>
                <li id="hint-lower">Una minúscula</li>
                <li id="hint-special">Un carácter especial (!@#$...)</li>
            </ul>
        </div>

        <div class="field">
            <label>Confirmar contraseña</label>
            <div class="password-wrap">
                <input id="confirm-pass" type="password" placeholder="Repetí tu contraseña">
                <button type="button" class="toggle-pass" onclick="togglePass('confirm-pass', this, event)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <button class="btn" id="btn-reset" onclick="resetPassword()">Guardar nueva contraseña</button>
        <p class="msg" id="msg"></p>
        <div class="volver"><a href="login.html">← Volver al login</a></div>
    </div>

    <script>
        const API = "https://backend-login-api-production.up.railway.app"
        const params = new URLSearchParams(window.location.search)
        const token  = params.get("token")

        if (!token) {
            document.getElementById('msg').className = 'msg err'
            document.getElementById('msg').textContent = 'Link inválido.'
            document.getElementById('btn-reset').disabled = true
        }

        function checkPass(v) {
            document.getElementById('hint-len').className     = v.length >= 8           ? 'ok' : ''
            document.getElementById('hint-upper').className   = /[A-Z]/.test(v)         ? 'ok' : ''
            document.getElementById('hint-lower').className   = /[a-z]/.test(v)         ? 'ok' : ''
            document.getElementById('hint-special').className = /[^a-zA-Z0-9]/.test(v)  ? 'ok' : ''
        }

        function togglePass(id, btn, e) {
            if (e) e.stopPropagation()
            const input = document.getElementById(id)
            if (input.type === 'password') {
                input.type = 'text'
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
            } else {
                input.type = 'password'
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
            }
        }

        async function resetPassword() {
            const newPass  = document.getElementById('new-pass').value
            const confirm  = document.getElementById('confirm-pass').value
            const msg      = document.getElementById('msg')

            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}$/
            if (!regex.test(newPass)) {
                msg.className = 'msg err'
                msg.textContent = 'La contraseña no cumple los requisitos.'
                return
            }
            if (newPass !== confirm) {
                msg.className = 'msg err'
                msg.textContent = 'Las contraseñas no coinciden.'
                return
            }

            const btn = document.getElementById('btn-reset')
            btn.disabled = true

            const res = await fetch(`${API}/auth/reset-password?token=${token}&new_password=${encodeURIComponent(newPass)}`, {
                method: 'POST'
            })

            if (res.ok) {
                msg.className = 'msg ok'
                msg.textContent = 'Contraseña actualizada. Redirigiendo al login...'
                setTimeout(() => window.location.href = 'login.html', 2500)
            } else {
                msg.className = 'msg err'
                msg.textContent = 'El link es inválido o ya expiró.'
                btn.disabled = false
            }
        }
    </script>
</body>
</html>
